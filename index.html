<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Composites Manufacturing</title>
<style>
  :root {
    --joby-blue:        #0961FE;
    --joby-blue-dark:   #0040B0;
    --joby-cream:       #F0EAD6;
    --joby-ink:         #0A0A0A;
    --joby-muted:       rgba(240, 234, 214, 0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--joby-ink);
    color: var(--joby-cream);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
    height: 100vh;
    overflow: hidden;
  }

  /* Full-bleed background image */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.55) 100%);
  }

  /* Top bar — brand only, no nav */
  .top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 48px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
    font-size: 16px;
    color: var(--joby-cream);
  }
  .brand-mark { width: 32px; height: 22px; color: var(--joby-cream); }
  .top-meta {
    font-size: 12px;
    color: var(--joby-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Main title content - bottom-left like a Joby deck cover */
  .title-block {
    position: fixed;
    bottom: 80px;
    left: 64px;
    right: 64px;
    z-index: 10;
    color: var(--joby-cream);
  }
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    margin-bottom: 28px;
    opacity: 0.85;
  }
  .eyebrow-num { font-weight: 500; }
  .title-block h1 {
    font-size: clamp(64px, 9vw, 152px);
    line-height: 0.94;
    letter-spacing: -0.04em;
    font-weight: 500;
    margin-bottom: 48px;
    max-width: 1200px;
  }

  /* The button arena - sits inline at bottom */
  #arena {
    position: relative;
    height: 64px;
    max-width: 320px;
  }
  #target {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    padding: 18px 36px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    color: var(--joby-cream);
    background: var(--joby-blue);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: left 0.18s cubic-bezier(0.34, 1.2, 0.64, 1),
                top 0.18s cubic-bezier(0.34, 1.2, 0.64, 1);
    z-index: 11;
    white-space: nowrap;
    letter-spacing: -0.005em;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 24px rgba(9, 97, 254, 0.3);
  }
  #target:hover { background: var(--joby-blue-dark); }
  #target svg { width: 14px; height: 14px; }

  /* Rage-bait message floats above the button area */
  .hero-message {
    position: fixed;
    bottom: 32px;
    left: 64px;
    right: 64px;
    z-index: 10;
    font-size: 13px;
    color: var(--joby-muted);
    font-style: italic;
    transition: opacity 0.25s;
    text-align: left;
    min-height: 20px;
  }

  @media (max-width: 720px) {
    .top { padding: 20px 24px; }
    .title-block { left: 24px; right: 24px; bottom: 100px; }
    .title-block h1 { margin-bottom: 32px; }
    .hero-message { left: 24px; right: 24px; bottom: 24px; }
    #target { padding: 16px 28px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="bg">
  <img src="https://cdn.sanity.io/images/h5mp19kq/production/9d0764b417418fd1c74f84ceffb1197d861b40fa-6000x4000.jpg?w=2400&fm=webp&q=85" alt="Joby S4 aircraft flying past the Golden Gate Bridge" />
</div>

<div class="top">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 56 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 8 C 14 24, 22 30, 28 24 C 34 30, 42 24, 52 8 C 42 18, 34 22, 28 16 C 22 22, 14 18, 4 8 Z" fill="currentColor"/>
    </svg>
    Composites Manufacturing
  </div>
  <div class="top-meta">2026</div>
</div>

<div class="title-block">
  <div class="eyebrow">
    <span class="eyebrow-num">01</span>
    <span>—</span>
    <span>Composites manufacturing</span>
  </div>
  <h1>Built<br />to fly.</h1>
  <div id="arena">
    <button id="target">
      Explore our team
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 7 L 11 7 M 7 3 L 11 7 L 7 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<div class="hero-message" id="message">&nbsp;</div>

<script>
(function() {
  const btn     = document.getElementById('target');
  const message = document.getElementById('message');

  let dodges = 0;
  let lastIdx = -1;

  const messages = [
    "Almost. Try clicking the button.",
    "The button is right there.",
    "You missed. Try again.",
    "Are you using a mouse? Try moving it more accurately.",
    "It's a button. You click it. This isn't difficult.",
    "Nearly everyone gets this on the first try.",
    "Some of our older users find this part challenging too.",
    "Pro tip: aim for the middle of the button.",
    "We've never had anyone fail this many times.",
    "Let's slow down and think about what a button is.",
    "Have you tried clicking with your other hand?",
    "Our records indicate this is your {n}th attempt.",
    "Are you sure you're cut out for online forms?",
    "We're going to need you to focus.",
    "The button has a job. Your job is to click it.",
    "Most visitors complete this in under 3 seconds.",
    "Other users are waiting. Please be considerate.",
    "If you can't complete this, perhaps a family member could help.",
    "We're starting to think you're doing this on purpose.",
    "Forget it. The button is fine. You're the problem.",
    "We're impressed by your commitment to failing.",
    "You've spent more time on this button than most people spend on taxes.",
    "The button has filed a complaint about you with HR.",
    "Honestly, we'd respect you more if you closed the tab.",
    "Did you forget what you came here to do?",
    "We've alerted your IT department. They've alerted your manager.",
    "The button is writing a memoir. Working title: 'Why Me'.",
    "Your cursor's movements have been added to a museum exhibit on patience.",
    "Frankly, the button is winning."
  ];

  function setMessage(text) {
    message.style.opacity = '0';
    setTimeout(() => {
      message.textContent = text;
      message.style.opacity = '1';
    }, 200);
  }

  function pickMessage() {
    const cap = Math.min(messages.length, Math.max(3, Math.floor(dodges / 1.2)));
    let idx;
    do {
      idx = Math.floor(Math.random() * cap);
    } while (idx === lastIdx && cap > 1);
    lastIdx = idx;
    setMessage(messages[idx].replace('{n}', dodges));
  }

  function dodge() {
    const btnRect = btn.getBoundingClientRect();
    const padding = 24;

    // Button can roam the whole viewport (minus the brand bar at top)
    const minX = padding;
    const maxX = window.innerWidth - btnRect.width - padding;
    const minY = 100;  // below the brand bar
    const maxY = window.innerHeight - btnRect.height - padding;

    const currentX = btnRect.left;
    const currentY = btnRect.top;

    let newX, newY, tries = 0;
    do {
      newX = minX + Math.random() * (maxX - minX);
      newY = minY + Math.random() * (maxY - minY);
      tries++;
    } while (tries < 8 && Math.hypot(newX - currentX, newY - currentY) < 180);

    // Switch to fixed positioning so the button can roam the whole screen
    btn.style.position = 'fixed';
    btn.style.left = Math.round(newX) + 'px';
    btn.style.top  = Math.round(newY) + 'px';
    btn.style.transform = 'none';

    dodges++;
    pickMessage();
  }

  btn.addEventListener('mouseenter', dodge);
  btn.addEventListener('mousemove', (e) => {
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    if (Math.hypot(e.clientX - cx, e.clientY - cy) < 70) dodge();
  });

  btn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dodge();
  });
})();
</script>

</body>
</html>
