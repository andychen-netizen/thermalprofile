<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#2a3a6e;color:#1a2a4a;padding:0}
.app-header{background:#1769c8;padding:1rem 1.5rem;display:flex;align-items:center;gap:16px;border-bottom:4px solid #f96020}
.app-header h2{font-size:18px;font-weight:500;color:#EEEBD8;margin:0}
.app-body{padding:1.25rem 1.5rem;background:#2a3a6e;min-height:100vh}
.drop-zone{border:2px dashed #6a9fd8;border-radius:12px;padding:2.5rem 1rem;text-align:center;cursor:pointer;background:#1e2d5a;transition:background .15s}
.drop-zone:hover,.drop-zone.drag{background:#263570}
.drop-zone p{font-size:14px;color:#9ab8d8;margin-top:6px}
.drop-label{font-size:15px;font-weight:500;color:#EEEBD8}
#file-input{display:none}
.section{margin-top:1.25rem}
.label{font-size:13px;color:#9ab8d8;margin-bottom:4px;font-weight:500}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:.5rem}
select{font-size:13px;padding:6px 10px;border-radius:8px;border:1.5px solid #4a6ea8;background:#1e2d5a;color:#EEEBD8}
.btn{font-size:13px;padding:6px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:500;transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1769c8;color:#EEEBD8}
.btn-primary:hover{background:#1255a8}
.btn-secondary{background:#1e2d5a;color:#EEEBD8;border:1.5px solid #4a6ea8}
.btn-secondary:hover{background:#263570}
.btn-orange{background:#f96020;color:#fff}
.btn-orange:hover{background:#e05010}
.tabs{display:flex;gap:0;margin-top:1.5rem;border-bottom:2px solid #f96020}
.tab{font-size:13px;padding:8px 20px;cursor:pointer;border:none;border-radius:8px 8px 0 0;color:#9ab8d8;background:#1e2d5a;font-weight:500;margin-right:4px}
.tab.active{background:#1769c8;color:#EEEBD8}
.tab-content{display:none;padding-top:1.25rem}
.tab-content.active{display:block}
table{width:100%;border-collapse:collapse;font-size:13px;background:#1e2d5a;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.3)}
th{padding:9px 14px;background:#1769c8;color:#EEEBD8;text-align:left;font-weight:500}
td{padding:7px 12px;border-bottom:1px solid #2a3a6e;color:#EEEBD8}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#233269}
td select{border:1px solid #4a6ea8;border-radius:6px;padding:3px 6px;background:#1e2d5a;font-size:13px;color:#EEEBD8}
td input{width:100%;font-size:13px;border:1px solid #4a6ea8;border-radius:6px;padding:3px 6px;background:#1e2d5a;color:#EEEBD8;outline:none}
td input:focus{border-color:#f96020}
.chart-outer{position:relative;width:100%;margin-top:.5rem}
.chart-wrap{position:relative;width:100%;height:480px;cursor:crosshair;border-radius:10px;overflow:hidden}
#select-box{position:absolute;border:2px solid #f96020;background:rgba(249,96,32,0.15);pointer-events:none;display:none;z-index:10}
.hint{font-size:12px;color:#9ab8d8;margin-top:6px}
.toolbar{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap;align-items:center}
.filter-bar{display:none;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:1rem;background:#1e2d5a;padding:10px 14px;border-radius:10px}
.filter-bar span{font-size:13px;color:#9ab8d8;font-weight:500}
.filter-btn{font-size:13px;padding:5px 16px;border-radius:20px;border:1.5px solid #4a6ea8;background:#1e2d5a;color:#9ab8d8;cursor:pointer;font-weight:500}
.filter-btn:hover{background:#263570;color:#EEEBD8}
.filter-btn.active{background:#f96020;border-color:#f96020;color:#fff}
#status{font-size:13px;color:#9ab8d8;margin-top:.5rem}
</style>

<div class="app-header">
  <h2>Thermal Profile Visualizer</h2>
</div>

<div class="app-body">
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv,.txt">
    <div class="drop-label">Drop your Excel or CSV file here</div>
    <p>or click to browse</p>
  </div>

  <div id="after-upload" style="display:none">
    <div class="section">
      <div class="label">Select MFID to plot:</div>
      <div class="row">
        <select id="mfid-sel"></select>
        <button class="btn btn-primary" id="plot-btn">Plot</button>
      </div>
    </div>
  </div>

  <div id="tabs-wrap" style="display:none">
    <div class="tabs">
      <button class="tab active" id="tab-input" onclick="switchTab('input')">TC # Input</button>
      <button class="tab" id="tab-analysis" onclick="switchTab('analysis')">Data Analysis</button>
    </div>

    <div class="tab-content active" id="content-input">
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Autoclave TC #</th><th>TP TC #</th><th>Type</th></tr></thead>
          <tbody id="tc-table-body"></tbody>
        </table>
      </div>
    </div>

    <div class="tab-content" id="content-analysis">
      <div class="filter-bar" id="filter-bar">
        <span>Filter:</span>
        <button class="filter-btn active" data-type="All">All</button>
        <button class="filter-btn" data-type="Part TC">Part TC</button>
        <button class="filter-btn" data-type="Tool TC">Tool TC</button>
        <button class="filter-btn" data-type="TPI TC">TPI TC</button>
      </div>
      <div class="chart-outer">
        <div class="chart-wrap" id="chart-wrap">
          <canvas id="myChart"></canvas>
          <div id="select-box"></div>
        </div>
        <div class="chart-wrap" id="compare-chart-wrap" style="display:none;height:480px">
          <canvas id="compareChart"></canvas>
        </div>
      </div>
      <div class="hint" id="zoom-hint" style="display:none">Scroll to zoom · Draw a box to zoom in</div>
      <div class="toolbar" id="toolbar" style="display:none">
        <button class="btn btn-secondary" id="z-reset">Reset Zoom</button>
        <button class="btn btn-secondary" id="compare-toggle">Compare Mode: Off</button>
        <button class="btn btn-secondary" id="report-toggle">Report Mode: Off</button>
        <button class="btn btn-orange" id="export-btn">Export PNG ↓</button>
      </div>

      <div id="compare-panel" style="display:none;margin-top:1rem;background:#1e2d5a;border-radius:10px;padding:1rem">
        <div style="display:flex;gap:1.5rem;flex-wrap:wrap;align-items:flex-start">
          <div>
            <div class="label">Reference TC (TP TC #):</div>
            <select id="ref-tc-sel" style="margin-top:4px"></select>
          </div>
          <div>
            <div class="label">Compare against:</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
              <button class="filter-btn active" data-cmp="All TCs" onclick="onCmpBtn(this)">All TCs</button>
              <button class="filter-btn" data-cmp="Part TC" onclick="onCmpBtn(this)">Part TC</button>
              <button class="filter-btn" data-cmp="Tool TC" onclick="onCmpBtn(this)">Tool TC</button>
              <button class="filter-btn" data-cmp="TPI TC" onclick="onCmpBtn(this)">TPI TC</button>
              <button class="filter-btn" data-cmp="custom" onclick="onCmpBtn(this)">Custom list…</button>
            </div>
          </div>
          <div id="compare-custom-wrap" style="display:none">
            <div class="label">Custom TP TC list (comma-separated):</div>
            <input type="text" id="custom-tc-input" placeholder="e.g. 2, 3, 11" style="margin-top:4px;font-size:13px;padding:5px 10px;border-radius:8px;border:1.5px solid #4a6ea8;background:#1e2d5a;color:#EEEBD8;width:260px">
            <div id="custom-tc-error" style="display:none;font-size:12px;color:#f96020;margin-top:4px"></div>
          </div>
          <div style="align-self:flex-end">
            <button class="btn btn-primary" id="compare-plot-btn">Plot Deviation</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const PALETTE=['#1a6abf','#f97316','#16a34a','#9333ea','#0891b2','#dc2626','#ca8a04','#0f766e','#c026d3','#4f46e5','#b45309','#be185d'];
let allRows=[],mfidMap={},dataHeaders=[],dataRows=[],chartInst=null,currentTcs=[];
let viewStart=0,viewEnd=1,activeFilter='All',hiddenDatasets=new Set(),interactionSetup=false,reportMode=false;
let compareMode=false,compareType='group',compareGroup='All',compareChartInst=null,hiddenCompareTcs=new Set();
let lastCompareTcs=[],lastCompareLabels=[],lastCompareDatasets=[];

const bgPlugin={
  id:'bgPlugin',
  beforeDraw(chart){
    const ctx=chart.ctx;
    ctx.save();
    ctx.fillStyle=reportMode?'#ffffff':'#1e2d5a';
    ctx.fillRect(0,0,chart.width,chart.height);
    ctx.restore();
  }
};
Chart.register(bgPlugin);

const dz=document.getElementById('drop-zone');
const fi=document.getElementById('file-input');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>{if(e.target.files&&e.target.files[0])loadFile(e.target.files[0])});

function loadFile(f){
  document.getElementById('status').textContent='Reading '+f.name+'…';
  const isCsv=/\.(csv|txt)$/i.test(f.name);
  const r=new FileReader();
  if(isCsv){
    r.onload=e=>{
      try{
        const text=e.target.result;
        const delim=text.split('\n')[0].includes('\t')?'\t':',';
        allRows=text.split('\n').map(line=>{
          const cols=[];let cur='',inQ=false;
          for(let i=0;i<line.length;i++){
            const ch=line[i];
            if(ch==='"')inQ=!inQ;
            else if(ch===delim&&!inQ){cols.push(cur.trim());cur='';}
            else cur+=ch;
          }
          cols.push(cur.trim());return cols;
        }).filter(r=>r.some(c=>c!==''));
        parseFile();document.getElementById('status').textContent='';
      }catch(err){document.getElementById('status').textContent='Error: '+err.message}
    };
    r.readAsText(f);
  } else {
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        parseFile();document.getElementById('status').textContent='';
      }catch(err){document.getElementById('status').textContent='Error: '+err.message}
    };
    r.readAsArrayBuffer(f);
  }
}

function parseFile(){
  mfidMap={};dataHeaders=[];dataRows=[];
  let inData=false,dataHeaderRow=-1;
  for(let i=0;i<allRows.length;i++){
    const row=allRows[i];
    const first=String(row[0]||'').trim();
    const mfidCell=row.map(c=>String(c).trim()).find(c=>/^MFID-/i.test(c));
    if(mfidCell){
      const mi=row.findIndex(c=>String(c).trim().toUpperCase()===mfidCell.toUpperCase());
      const tcs=row.slice(mi+1).map(c=>String(c).trim()).filter(c=>/^TC\d+$/i.test(c));
      mfidMap[mfidCell.toUpperCase()]=tcs;
    }
    if(first==='[CURE CYCLE DATA]')inData=true;
    if(inData&&dataHeaderRow===-1&&/^elapsedtime/i.test(first)){
      dataHeaderRow=i;dataHeaders=row.map(c=>String(c).trim());continue;
    }
    if(dataHeaderRow>-1&&i>dataHeaderRow&&first!=='')dataRows.push(row);
  }
  const mfids=Object.keys(mfidMap);
  const sel=document.getElementById('mfid-sel');
  sel.innerHTML=mfids.length?mfids.map(m=>`<option value="${m}">${m}</option>`).join(''):'<option>No MFIDs found</option>';
  document.getElementById('after-upload').style.display='block';
}

function switchTab(t){
  ['input','analysis'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',t===x);
    document.getElementById('content-'+x).classList.toggle('active',t===x);
  });
}

document.getElementById('plot-btn').onclick=()=>{
  const key=document.getElementById('mfid-sel').value;
  if(!mfidMap[key])return;
  viewStart=0;viewEnd=1;hiddenDatasets=new Set();
  currentTcs=mfidMap[key];
  renderTable(currentTcs);
  document.getElementById('tabs-wrap').style.display='block';
  renderChart();
  setupInteraction();
};

document.getElementById('filter-bar').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn||!btn.dataset.type)return;
  activeFilter=btn.dataset.type;
  hiddenDatasets=new Set();
  document.querySelectorAll('#filter-bar .filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
  if(currentTcs.length)renderChart();
});

function renderTable(tcs){
  document.getElementById('tc-table-body').innerHTML=tcs.map(tc=>`
    <tr>
      <td>${tc}</td>
      <td><input type="text" placeholder="Enter #" oninput="updateLegend();populateRefTcDropdown()"></td>
      <td><select><option value="">— select —</option><option>Part TC</option><option>Tool TC</option><option>TPI TC</option></select></td>
    </tr>`).join('');
}

function getLabelsMap(){
  const map={};
  document.querySelectorAll('#tc-table-body tr').forEach(row=>{
    const ac=row.cells[0].textContent.trim();
    const tp=row.cells[1].querySelector('input').value.trim();
    map[ac]=tp?'TC'+tp:ac;
  });
  return map;
}

function getTypeMap(){
  const map={};
  document.querySelectorAll('#tc-table-body tr').forEach(row=>{
    const ac=row.cells[0].textContent.trim();
    map[ac]=row.cells[2].querySelector('select').value;
  });
  return map;
}

function getValidTcs(){
  const typeMap=getTypeMap();
  if(activeFilter==='All')return currentTcs.filter(tc=>dataHeaders.includes(tc));
  return currentTcs.filter(tc=>dataHeaders.includes(tc)&&typeMap[tc]===activeFilter);
}

function updateLegend(){
  if(!chartInst)return;
  const labelsMap=getLabelsMap();
  const validTcs=getValidTcs();
  chartInst.data.datasets.forEach((ds,i)=>{if(validTcs[i])ds.label=labelsMap[validTcs[i]]||validTcs[i]});
  chartInst.update('none');
}

function fmtTime(v){
  if(v===''||v==null)return'';
  if(typeof v==='number'){
    const sec=Math.round(v*86400);
    const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  return String(v);
}

function getColors(){
  return{
    ac:reportMode?'#000000':'#9ab8d8',
    gc:reportMode?'rgba(0,0,0,0.1)':'rgba(255,255,255,0.06)',
    lc:reportMode?'#000000':'#EEEBD8'
  };
}

function renderChart(){
  const etIdx=dataHeaders.findIndex(h=>/^elapsedtime/i.test(h));
  if(etIdx===-1)return;
  const validTcs=getValidTcs();
  const labelsMap=getLabelsMap();
  const total=dataRows.length;
  const s=Math.max(0,Math.floor(viewStart*total));
  const e=Math.min(total,Math.ceil(viewEnd*total));
  const visRows=dataRows.slice(s,e);
  const labels=visRows.map(r=>fmtTime(r[etIdx]));
  const datasets=validTcs.map((tc,i)=>{
    const idx=dataHeaders.indexOf(tc);
    const vals=visRows.map(r=>{
      const v=String(r[idx]??'').replace(/[^\d.\-]/g,'');
      const n=parseFloat(v);return isNaN(n)?null:n;
    });
    return{label:labelsMap[tc]||tc,data:vals,hidden:hiddenDatasets.has(tc),
      borderColor:PALETTE[i%PALETTE.length],backgroundColor:PALETTE[i%PALETTE.length]+'22',
      pointRadius:0,pointHitRadius:10,borderWidth:1.5,tension:.3,spanGaps:true};
  });
  if(chartInst){chartInst.destroy();chartInst=null;}
  const{ac,gc,lc}=getColors();
  chartInst=new Chart(document.getElementById('myChart'),{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:100},
      plugins:{
        bgPlugin:{},
        legend:{display:true,position:'right',labels:{boxWidth:12,boxHeight:12,borderRadius:2,padding:10,font:{size:11},color:lc,
          generateLabels(chart){
            return chart.data.datasets.map((ds,i)=>({
              text:ds.label,
              fillStyle:hiddenDatasets.has(validTcs[i])?'transparent':ds.borderColor,
              strokeStyle:ds.borderColor,lineWidth:hiddenDatasets.has(validTcs[i])?2:0,
              fontColor:lc,color:lc,hidden:false,datasetIndex:i
            }));
          }
        },
        onClick(e,item){
          const tc=validTcs[item.datasetIndex];
          if(hiddenDatasets.has(tc))hiddenDatasets.delete(tc);
          else hiddenDatasets.add(tc);
          renderChart();
        }},
        tooltip:{mode:'nearest',intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(1)+'°C':'–'}`}}
      },
      scales:{
        x:{title:{display:true,text:'Elapsed time',font:{size:12,weight:'bold'},color:ac},ticks:{maxTicksLimit:12,autoSkip:true,font:{size:11},color:ac},grid:{color:gc},border:{color:ac}},
        y:{title:{display:true,text:'Temperature (°C)',font:{size:12,weight:'bold'},color:ac},ticks:{font:{size:11},color:ac,callback:v=>v.toFixed(0)+'°C'},grid:{color:gc},border:{color:ac}}
      }
    }
  });
  document.getElementById('filter-bar').style.display='flex';
  document.getElementById('zoom-hint').style.display='block';
  document.getElementById('toolbar').style.display='flex';
}

function renderCompareChart(compareTcs,labels,datasets){
  if(compareChartInst){compareChartInst.destroy();compareChartInst=null;}
  const{ac,gc,lc}=getColors();
  const updatedDatasets=datasets.map((ds,i)=>({...ds,hidden:hiddenCompareTcs.has(compareTcs[i])}));
  compareChartInst=new Chart(document.getElementById('compareChart'),{
    type:'line',data:{labels,datasets:updatedDatasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:100},
      plugins:{
        bgPlugin:{},
        legend:{display:true,position:'right',labels:{boxWidth:12,boxHeight:12,borderRadius:2,padding:8,font:{size:10},color:lc,
          generateLabels(chart){
            return chart.data.datasets.map((ds,i)=>({
              text:ds.label,
              fillStyle:hiddenCompareTcs.has(compareTcs[i])?'transparent':ds.borderColor,
              strokeStyle:ds.borderColor,lineWidth:hiddenCompareTcs.has(compareTcs[i])?2:0,
              fontColor:lc,color:lc,hidden:false,datasetIndex:i
            }));
          }
        },
        onClick(e,item){
          const tc=compareTcs[item.datasetIndex];
          if(hiddenCompareTcs.has(tc))hiddenCompareTcs.delete(tc);
          else hiddenCompareTcs.add(tc);
          renderCompareChart(compareTcs,labels,datasets);
        }},
        tooltip:{mode:'nearest',intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(2)+'°C':'–'}`}}
      },
      scales:{
        x:{title:{display:true,text:'Elapsed time',font:{size:12,weight:'bold'},color:ac},ticks:{maxTicksLimit:12,autoSkip:true,font:{size:11},color:ac},grid:{color:gc},border:{color:ac}},
        y:{title:{display:true,text:'Deviation (°C)',font:{size:12,weight:'bold'},color:ac},ticks:{font:{size:11},color:ac,callback:v=>v.toFixed(1)+'°C'},grid:{color:gc},border:{color:ac}}
      }
    }
  });
}

function setupInteraction(){
  if(interactionSetup)return;
  interactionSetup=true;
  const wrap=document.getElementById('chart-wrap');
  const box=document.getElementById('select-box');
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const span=viewEnd-viewStart;
    const factor=e.deltaY>0?1.15:0.87;
    const newSpan=Math.min(1,Math.max(0.02,span*factor));
    const mid=(viewStart+viewEnd)/2;
    viewStart=Math.max(0,mid-newSpan/2);
    viewEnd=Math.min(1,viewStart+newSpan);
    if(viewEnd>1){viewEnd=1;viewStart=Math.max(0,1-newSpan);}
    renderChart();
  },{passive:false});
  const getArea=()=>chartInst?chartInst.chartArea:null;
  let isDragging=false,startX=null;
  wrap.addEventListener('mousedown',e=>{
    const area=getArea();if(!area)return;
    const rect=wrap.getBoundingClientRect();
    const rawX=e.clientX-rect.left;
    if(rawX<area.left||rawX>area.right)return;
    isDragging=true;
    startX=Math.min(Math.max(rawX,area.left),area.right);
    box.style.left=startX+'px';box.style.width='0';
    box.style.top=area.top+'px';box.style.height=(area.bottom-area.top)+'px';
    box.style.display='block';e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    const area=getArea();if(!area)return;
    const rect=wrap.getBoundingClientRect();
    const curX=Math.min(Math.max(e.clientX-rect.left,area.left),area.right);
    box.style.left=Math.min(startX,curX)+'px';
    box.style.width=Math.abs(curX-startX)+'px';
  });
  window.addEventListener('mouseup',e=>{
    if(!isDragging)return;
    isDragging=false;box.style.display='none';
    const area=getArea();if(!area)return;
    const rect=wrap.getBoundingClientRect();
    const curX=Math.min(Math.max(e.clientX-rect.left,area.left),area.right);
    const areaW=area.right-area.left;
    const left=(Math.min(startX,curX)-area.left)/areaW;
    const right=(Math.max(startX,curX)-area.left)/areaW;
    if(right-left<0.01)return;
    const span=viewEnd-viewStart;
    viewStart=Math.max(0,viewStart+left*span);
    viewEnd=Math.min(1,viewStart+(right-left)*span);
    renderChart();
  });
}

document.getElementById('z-reset').onclick=()=>{viewStart=0;viewEnd=1;if(currentTcs.length)renderChart()};

document.getElementById('compare-toggle').onclick=()=>{
  compareMode=!compareMode;
  const btn=document.getElementById('compare-toggle');
  btn.textContent='Compare Mode: '+(compareMode?'On':'Off');
  btn.style.background=compareMode?'#fff':'';
  btn.style.color=compareMode?'#1a2a4a':'';
  btn.style.borderColor=compareMode?'#4a6ea8':'';
  document.getElementById('compare-panel').style.display=compareMode?'block':'none';
  if(!compareMode){
    document.getElementById('compare-chart-wrap').style.display='none';
    document.getElementById('chart-wrap').style.display='block';
    if(compareChartInst){compareChartInst.destroy();compareChartInst=null;}
  }
  populateRefTcDropdown();
};

function populateRefTcDropdown(){
  const sel=document.getElementById('ref-tc-sel');
  const prev=sel.value;
  sel.innerHTML='';
  document.querySelectorAll('#tc-table-body tr').forEach(row=>{
    const ac=row.cells[0].textContent.trim();
    const tp=row.cells[1].querySelector('input').value.trim();
    if(tp){const opt=document.createElement('option');opt.value=ac;opt.textContent='TC'+tp;sel.appendChild(opt);}
  });
  if(prev)sel.value=prev;
  if(!sel.options.length){const opt=document.createElement('option');opt.textContent='No TP TC # assigned yet';opt.disabled=true;sel.appendChild(opt);}
}

function onCmpBtn(btn){
  const val=btn.dataset.cmp;
  const allBtns=[...document.querySelectorAll('[data-cmp]')];
  if(val==='custom'){
    allBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('compare-custom-wrap').style.display='block';
  } else if(val==='All TCs'){
    allBtns.forEach(b=>b.classList.remove('active'));
    allBtns.filter(b=>b.dataset.cmp!=='custom').forEach(b=>b.classList.add('active'));
    document.getElementById('compare-custom-wrap').style.display='none';
  } else {
    document.querySelector('[data-cmp="custom"]').classList.remove('active');
    document.getElementById('compare-custom-wrap').style.display='none';
    const allTcsBtn=document.querySelector('[data-cmp="All TCs"]');
    btn.classList.toggle('active');
    const groupBtns=allBtns.filter(b=>b.dataset.cmp!=='All TCs'&&b.dataset.cmp!=='custom');
    const allActive=groupBtns.every(b=>b.classList.contains('active'));
    allTcsBtn.classList.toggle('active',allActive);
  }
}

function getSelectedCmpGroups(){
  const sel=[...document.querySelectorAll('[data-cmp].active')].map(b=>b.dataset.cmp);
  if(sel.includes('custom'))return{type:'custom'};
  const groups=sel.filter(s=>s!=='All TCs');
  return{type:'group',groups};
}

document.getElementById('compare-plot-btn').onclick=()=>{
  const refTc=document.getElementById('ref-tc-sel').value;
  if(!refTc)return;
  const etIdx=dataHeaders.findIndex(h=>/^elapsedtime/i.test(h));
  const refIdx=dataHeaders.indexOf(refTc);
  if(refIdx===-1)return;
  const tpToAc={};
  document.querySelectorAll('#tc-table-body tr').forEach(row=>{
    const ac=row.cells[0].textContent.trim();
    const tp=row.cells[1].querySelector('input').value.trim();
    if(tp)tpToAc['TC'+tp]=ac;
  });
  const cmpSel=getSelectedCmpGroups();
  let compareTcs=[];
  document.getElementById('custom-tc-error').style.display='none';
  if(cmpSel.type==='group'){
    const typeMap=getTypeMap();
    if(!cmpSel.groups.length){
      compareTcs=currentTcs.filter(tc=>dataHeaders.includes(tc)&&tc!==refTc);
    } else {
      compareTcs=currentTcs.filter(tc=>dataHeaders.includes(tc)&&tc!==refTc&&cmpSel.groups.includes(typeMap[tc]));
    }
  } else {
    const raw=document.getElementById('custom-tc-input').value;
    const entries=raw.split(',').map(s=>s.trim()).filter(Boolean);
    const invalid=[];
    entries.forEach(entry=>{
      const key=entry.toUpperCase().startsWith('TC')?entry.toUpperCase():'TC'+entry;
      const ac=tpToAc[key];
      if(!ac||!dataHeaders.includes(ac)){invalid.push(entry);}
      else if(ac!==refTc)compareTcs.push(ac);
    });
    if(invalid.length){
      const errEl=document.getElementById('custom-tc-error');
      errEl.textContent='Not found in TP TC # list: '+invalid.join(', ');
      errEl.style.display='block';
      if(!compareTcs.length)return;
    }
  }
  if(!compareTcs.length)return;
  const labelsMap=getLabelsMap();
  const total=dataRows.length;
  const s=Math.max(0,Math.floor(viewStart*total));
  const en=Math.min(total,Math.ceil(viewEnd*total));
  const visRows=dataRows.slice(s,en);
  const labels=visRows.map(r=>fmtTime(r[etIdx]));
  const datasets=compareTcs.map((tc,i)=>{
    const idx=dataHeaders.indexOf(tc);
    const vals=visRows.map(r=>{
      const rv=parseFloat(String(r[refIdx]??'').replace(/[^\d.\-]/g,''));
      const cv=parseFloat(String(r[idx]??'').replace(/[^\d.\-]/g,''));
      return(isNaN(rv)||isNaN(cv))?null:parseFloat((cv-rv).toFixed(2));
    });
    return{label:labelsMap[tc]||tc,data:vals,
      borderColor:PALETTE[i%PALETTE.length],backgroundColor:PALETTE[i%PALETTE.length]+'22',
      pointRadius:0,pointHitRadius:10,borderWidth:1.5,tension:.3,spanGaps:true};
  });
  lastCompareTcs=compareTcs;lastCompareLabels=labels;lastCompareDatasets=datasets;
  hiddenCompareTcs=new Set();
  document.getElementById('chart-wrap').style.display='none';
  document.getElementById('compare-chart-wrap').style.display='block';
  renderCompareChart(compareTcs,labels,datasets);
};

document.getElementById('report-toggle').onclick=()=>{
  reportMode=!reportMode;
  const btn=document.getElementById('report-toggle');
  btn.textContent='Report Mode: '+(reportMode?'On':'Off');
  btn.style.background=reportMode?'#fff':'';
  btn.style.color=reportMode?'#1a2a4a':'';
  document.getElementById('chart-wrap').style.background=reportMode?'#fff':'';
  document.getElementById('compare-chart-wrap').style.background=reportMode?'#fff':'';
  if(chartInst){chartInst.destroy();chartInst=null;renderChart();}
  if(compareChartInst&&lastCompareTcs.length)renderCompareChart(lastCompareTcs,lastCompareLabels,lastCompareDatasets);
};

document.getElementById('export-btn').onclick=()=>{
  const activeChart=compareChartInst||chartInst;
  if(!activeChart)return;
  const tmpCanvas=document.createElement('canvas');
  tmpCanvas.width=activeChart.canvas.width;
  tmpCanvas.height=activeChart.canvas.height;
  const tmpCtx=tmpCanvas.getContext('2d');
  tmpCtx.fillStyle=reportMode?'#ffffff':'#1e2d5a';
  tmpCtx.fillRect(0,0,tmpCanvas.width,tmpCanvas.height);
  tmpCtx.drawImage(activeChart.canvas,0,0);
  const a=document.createElement('a');
  a.href=tmpCanvas.toDataURL('image/png');
  a.download='thermal_profile.png';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};
</script>
